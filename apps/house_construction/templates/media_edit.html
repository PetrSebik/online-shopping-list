{% extends "base_housing.html" %}

{% block title %}Media{% endblock %}

{% block content %}


    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white p-3">
                        <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Upravit média</h5>
                    </div>
                    <div class="card-body p-4">
                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label class="form-label fw-bold">Název</label>
                                <input type="text" name="title" class="form-control"
                                       value="{{ form.title.value|default:'' }}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Popis</label>
                                <textarea name="description" class="form-control"
                                          rows="3">{{ form.description.value|default:'' }}</textarea>
                            </div>

                            <div class="mb-4 p-3 bg-light border rounded">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" role="switch" name="hide"
                                           id="id_hide"
                                           {% if form.hide.value %}checked{% endif %}>
                                    <label class="form-check-label fw-bold" for="id_hide">Skrýt před veřejností</label>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Změnit obrázek (volitelné)</label>
                                <input type="file" name="image" class="form-control mb-2">
                                <div class="small text-muted">
                                    Aktuální náhled:<br>
                                    <img src="{{ object.thumbnail.url }}" class="img-thumbnail mt-2"
                                         style="max-height: 150px;">
                                </div>
                            </div>

                            <div class="d-flex justify-content-between pt-3 border-top">
                                <a href="{% url 'media_detail' object.id %}" class="btn btn-light border">Zrušit</a>
                                <button type="submit" class="btn btn-success px-4 shadow-sm">Uložit změny</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

{% endblock %}
