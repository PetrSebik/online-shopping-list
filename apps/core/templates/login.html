{% load static %}<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení</title>
    <link rel="icon" href="{% static 'icon/favicon-32.png' %}" type="image/x-icon" sizes="32x32">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #eef2f3 0%, #dfe7e3 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 1.5rem;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.12);
        }
        .login-icon {
            width: 76px;
            height: 76px;
            background: #2e5d45;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -38px auto 18px;
            box-shadow: 0 6px 18px rgba(46, 93, 69, 0.32);
        }
        .btn-login {
            padding: 0.75rem;
            font-weight: 600;
            background-color: #2e5d45;
            border: none;
        }
        .btn-login:hover { background-color: #21452f; }
        .form-control:focus {
            border-color: #2e5d45;
            box-shadow: 0 0 0 0.2rem rgba(46, 93, 69, 0.15);
        }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="card-body p-4 p-sm-5">
            <div class="login-icon">
                <i class="bi bi-person-lock fs-2"></i>
            </div>

            <h1 class="h4 text-center fw-bold mb-1">Přihlášení</h1>
            <p class="text-center text-muted mb-4 small">Přihlaste se do svého účtu</p>

            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                {% if form.errors %}
                    <div class="alert alert-danger py-2 small border-0" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>Nesprávné jméno nebo heslo.
                    </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label small fw-semibold text-muted">Uživatelské jméno</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white text-muted"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" autocomplete="username" autofocus required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-semibold text-muted">Heslo</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white text-muted"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" autocomplete="current-password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-login w-100">
                    Přihlásit se <i class="bi bi-box-arrow-in-right ms-2"></i>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
